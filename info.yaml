# Tiny Tapeout project information
project:
  title:        "8-bit Vector Accumulator"
  author:       "Saanj Shetty"
  discord:      ""      # Optional
  description:  "A synchronous 8-bit accumulator that adds inputs to a running sum"
  language:     "Verilog"
  clock_hz:     100000  # Based on your testbench's 100KHz (10us period)

  # How many tiles your design occupies? 1x1 is plenty for an accumulator.
  tiles: "1x1"          

  # This must match the module name in your project.v
  top_module:  "tt_um_example"

  source_files:
    - "project.v"

# The pinout. Mapping ui to your ui_in and uo to your uo_out
pinout:
  # Inputs (ui_in in your Verilog)
  ui[0]: "in0"
  ui[1]: "in1"
  ui[2]: "in2"
  ui[3]: "in3"
  ui[4]: "in4"
  ui[5]: "in5"
  ui[6]: "in6"
  ui[7]: "in7"

  # Outputs (uo_out in your Verilog)
  uo[0]: "out0"
  uo[1]: "out1"
  uo[2]: "out2"
  uo[3]: "out3"
  uo[4]: "out4"
  uo[5]: "out5"
  uo[6]: "out6"
  uo[7]: "out7"

  # Bidirectional pins (uio pins)
  uio[0]: "unused"
  uio[1]: "unused"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

# Do not change!
yaml_version: 6